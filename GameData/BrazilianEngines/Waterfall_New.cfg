@PART[BRA-S20]:FOR[RSMP]:NEEDS[Waterfall,SmokeScreen]
{
	// Removes the stock effect block, and replace it with one that has no particles
	!EFFECTS {}
	!MODULE[ModuleWaterfallFX],* {}
	!PLUME {}
	EFFECTS
	{
		running_engine
		{
			AUDIO
			{
				channel = Ship
				clip = RSMP/Sounds/srb-loop-3
				volume = 1.0
				pitch = 1.0
				loop = true
			}
		}
		engage
		{
			AUDIO
			{
				channel = Ship
				clip = RSMP/Sounds/srb-loop-3
				volume = 1.0
				pitch = 1.0
				loop = true
			}
		}
		disengage
		{
			AUDIO
			{
				channel = Ship
				clip = sound_explosion_low
				volume = 1.0
				pitch = 0.8
				loop = false
			}
		}
		flameout
		{
			PREFAB_PARTICLE
			{
				prefabName = fx_exhaustSparks_flameout_2
				transformName = thrustTransform
				oneShot = true
				localOffset = 0,0,1.8
			}
			AUDIO
			{
				channel = Ship
				clip = sound_explosion_low
				volume = 1.0
				pitch = 0.8
				loop = false
			}
		}
	}
	MODULE
	{
		name = ModuleWaterfallFX
		moduleID = S20-FX
		CONTROLLER
      	{
			name = atmosphereDepth
			linkedTo = atmosphere_density
      	}
      	CONTROLLER
      	{
			name = throttle
			linkedTo = throttle
      	}
      	CONTROLLER
      	{
			name = Random
			linkedTo = random
			noiseType = perlin
			scale = 0.5
			minimum = -0.5
			speed = 10
			seed = 40
      	}
     	CONTROLLER
      	{
			name = Burnout
			linkedTo = engineEvent
			eventName = flameout
			eventDuration = 600
			eventCurve
			{
				key = 0 0
				key = 0.1 1
				key = 600 0.2
			}
      	}
		TEMPLATE
        {
			templateName = srb-waterfall
			overrideParentTransform = thrustTransform
			position = 0,0,-0.022
			rotation = 0, 0, 0
			scale = 0.108, 0.108, 0.216
		}
		TEMPLATE
		{
			templateName = lemon-SRB-core
			overrideParentTransform = thrustTransform
			position = 0,0,-0.034
			rotation = 0, 0, 0
			scale = 0.138, 0.138, 0.2
		}
	}
}
