PART
{
	module = Part
	name = BRA-L15
	author = Cross Aerospace
	
	category = Engine
	subcategory = 0
	
	RSSROConfig = true
	RP0conf = true
	
	crashTolerance = 10
	maxTemp = 923.15
	skinTemp = 1023.15
	fuelCrossfeed = true
	breakingForce = 10000
	breakingTorque = 10000
	
	//  ============================================================================
	//	Update Below
	//  ============================================================================
	
	MODEL
	{
		model = ROEngines/Assets/BDB/Juno/bluedog_Juno4_Engine_6K
		scale = 0.41625, 0.4700, 0.41625
	}
	
	scale = 1.0
	rescaleFactor = 2.0
	node_stack_top = 0.0, 0.21894265, 0.0, 0.0, 1.0, 0.0, 0
	node_stack_bottom = 0.0, -0.17088088, 0.0, 0.0, -1.0, 0.0, 0
	node_attach = 0,0.21894265,0,0,1,0,2
	// stack, srfAttach, allowStack, allowSrfAttach, allowCollision //
	attachRules = 1,1,1,1,0

	
	title = L15 Series
	manufacturer = Instituto de Aeronáutica e Espaço (IAE)
	description = Motor desenvolvido pelo Instituto de Aeronáutica e Espaço (IAE) no Brasil. O L-15 utiliza LOX (oxigênio líquido) e etanol como propelentes. Variante `L15E`: pump-fed (bomba elétrica). Propostos (preliminar): Isp_sl = 280 s; Isp_vac = 300 s. Fonte: `RESEARCH_REPORT.md`.
	// PROPOSED_PERF: Isp_sl=280;Isp_vac=300;source=/tmp/sources

	tags = Brazil, VLS, Cross, L15
	engineType = L15
	stagingIcon = LIQUID_ENGINE
	stageOffset = 1
	childStageOffset = 1
	
	TechRequired = start
	cost = 200
	entryCost = 1
	
	MODULE
	{
		name = ModuleEnginesRF
		thrustVectorTransformName = thrustTransform
	}

	MODULE
	{
    	name = ModuleGimbal
    	gimbalResponseSpeed = 12
    	useGimbalResponseSpeed = true
    	gimbalTransformName = thrustTransform
    	gimbalRange = 4
    	gimbalLimitX = true  // Habilita yaw
    	gimbalLimitY = true  // Habilita pitch
    	gimbalLimitZ = false // Desabilita roll
	}

	MODULE
	{
		name = FXModuleLookAtConstraint
		CONSTRAINLOOKFX
		{
			targetName = LowerStrut1
			rotatorsName = UpperStrut1
		}
		CONSTRAINLOOKFX
		{
			targetName = LowerStrut2
			rotatorsName = UpperStrut2
		}
		CONSTRAINLOOKFX
		{
			targetName = UpperStrut1
			rotatorsName = LowerStrut1
		}
		CONSTRAINLOOKFX
		{
			targetName = UpperStrut2
			rotatorsName = LowerStrut2
		}
	}

	MODULE
	{
		name = ModuleSurfaceFX
		thrustProviderModuleIndex = 0
		fxMax = 0.5
		maxDistance = 30
		falloff = 1.5
		thrustTransformName = thrustTransform
	}

	MODULE
	{
		name = FXModuleThrottleEffects
		fxModuleNames = heatColor
		responseSpeed = 1.0
		dependOnEngineState = True
		dependOnThrottle = True
	}

	MODULE
	{
		name = FXModuleThrottleEffects
		fxModuleNames = throttleColor
		responseSpeed = 1.0
		dependOnEngineState = True
		dependOnThrottle = True
	}

	MODULE
	{
		name = ModuleColorChanger
		moduleID = heatColor
		animRate = 0.015
		shaderProperty = _EmissiveColor
		toggleInEditor = false
		toggleInFlight = false
		redCurve
		{
			key = 1 1 1 1
			key = 1 1 1 1
		}
		greenCurve
		{
			key = 0 0 1 1
			key = 1 1 1 1
		}
		blueCurve
		{
			key = 0 0 1 1
			key = 1 1 1 1
		}
		alphaCurve
		{
			key = 0 0 1 1
			key = 1 1 1 1
		}
	}

	MODULE
	{
		name = ModuleEngineIgnitionReliability
		ignitionReliabilityStart = 0.85
		ignitionReliabilityEnd = 0.95
		cycleReliabilityStart = 0.80
		cycleReliabilityEnd = 0.98
	}
}

