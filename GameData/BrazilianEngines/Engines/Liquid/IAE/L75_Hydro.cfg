PART
{
	module = Part
	name = BRA-L75-H
	author = Cross Aerospace
	
	category = Engine
	subcategory = 0
	
	RSSROConfig = true
	RP0conf = true
	
	crashTolerance = 10
	maxTemp = 923.15
	skinTemp = 1023.15
	fuelCrossfeed = true
	breakingForce = 10000
	breakingTorque = 10000
	
	//  ============================================================================
	//	Update Below
	//  ============================================================================
	
	MODEL
	{
		model = ROEngines/Assets/DylanSemrau/PA_BE-4
		scale = 0.43103448, 0.4390244, 0.43103448
	}

	scale = 1.0
	rescaleFactor = 1.5646
	node_stack_top = 0.0, 0.26088782, 0.0, 0.0, 1.0, 0.0, 2
	node_stack_bottom = 0.0, -0.48911708, 0.0, 0.0, -1.0, 0.0, 1
	node_attach = 0.0, 0.4738636, 0.0, 0.0, 1.0, 0.0, 2
	// stack, srfAttach, allowStack, allowSrfAttach, allowCollision
	attachRules = 1,1,1,1,0

	
	title = L75-H Series

	manufacturer = Cross Aerospace
	description = Variação experimental desenvolvida por Cross Aerospace. Esta versão L75-H é otimizada para propelentes criogênicos (Hydrolox — LOX + Hidrogênio). Projetada como variante hipotética para testes e pesquisa. Proposto (preliminar): Isp_vac = 400 s (estimativa). Fonte: `RESEARCH_REPORT.md`.
	// PROPOSED_PERF: Isp_vac=400;Isp_sl=350?;source=/tmp/sources

	tags = Brazil, VLS, Cross, L75, Hydro, Hydrolox, LOX, Hydrogen, Experimental, Research
	engineType = L75-H
	stagingIcon = LIQUID_ENGINE
	stageOffset = 1
	childStageOffset = 1
	
	TechRequired = advRocketry1970s
	cost = 600
	entryCost = 1
	
	MODULE
	{
		name = ModuleEnginesRF
		thrustVectorTransformName = thrustTransform
	}
	MODULE
	{
    	name = ModuleGimbal
    	gimbalResponseSpeed = 12
    	useGimbalResponseSpeed = true
    	gimbalTransformName = thrustTransform
    	gimbalRange = 4
    	gimbalLimitX = true  // Habilita yaw
    	gimbalLimitY = true  // Habilita pitch
    	gimbalLimitZ = false // Desabilita roll
	}
	MODULE
	{
		name = FXModuleLookAtConstraint
		CONSTRAINLOOKFX
		{
			targetName = LowerStrut1
			rotatorsName = UpperStrut1
		}
		CONSTRAINLOOKFX
		{
			targetName = LowerStrut2
			rotatorsName = UpperStrut2
		}
		CONSTRAINLOOKFX
		{
			targetName = UpperStrut1
			rotatorsName = LowerStrut1
		}
		CONSTRAINLOOKFX
		{
			targetName = UpperStrut2
			rotatorsName = LowerStrut2
		}
	}
	MODULE
	{
		name = ModuleSurfaceFX
		thrustProviderModuleIndex = 0
		fxMax = 0.5
		maxDistance = 30
		falloff = 1.5
		thrustTransformName = thrustTransform
	}
	MODULE
	{
		name = FXModuleThrottleEffects
		fxModuleNames = heatColor
		responseSpeed = 1.0
		dependOnEngineState = True
		dependOnThrottle = True
	}
	MODULE
	{
		name = FXModuleThrottleEffects
		fxModuleNames = throttleColor
		responseSpeed = 1.0
		dependOnEngineState = True
		dependOnThrottle = True
	}
	MODULE
	{
		name = ModuleColorChanger
		moduleID = heatColor
		animRate = 0.015
		shaderProperty = _EmissiveColor
		toggleInEditor = false
		toggleInFlight = false
		redCurve
		{
			key = 1 1 1 1
			key = 1 1 1 1
		}
		greenCurve
		{
			key = 0 0 1 1
			key = 1 1 1 1
		}
		blueCurve
		{
			key = 0 0 1 1
			key = 1 1 1 1
		}
		alphaCurve
		{
			key = 0 0 1 1
			key = 1 1 1 1
		}
	}
	MODULE
	{
		name = ModuleEngineIgnitionReliability
		ignitionReliabilityStart = 0.75
		ignitionReliabilityEnd = 0.92
		cycleReliabilityStart = 0.70
		cycleReliabilityEnd = 0.94
	}
}

