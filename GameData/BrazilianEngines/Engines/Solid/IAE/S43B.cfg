PART
{
	module = Part
	name = BRA-S43B
	author = Cross Aerospace
	
	category = Engine
	subcategory = 0
	
	RSSROConfig = true
	RP0conf = true
	
	crashTolerance = 10
	maxTemp = 673.15
	skinTemp = 773.15
	fuelCrossfeed = true
	breakingForce = 10000
	breakingTorque = 10000
	
	//  ============================================================================
	//	Update Below
	//  ============================================================================
	
	MODEL
	{
		model = BrazilianEngines/Models/VLM-S-50V
		scale = 1, 1, 1
	}
	
	scale = 1.0
	rescaleFactor = 0.7299
	node_stack_top = 0.0, 0.5, 0.0, 0.0, 1.0, 0.0, 0
	node_stack_bottom = 0.0, -0.5, 0.0, 0.0, -1.0, 0.0, 0
	node_attach = 0,0.1,0,0,1,0,2
	// stack, srfAttach, allowStack, allowSrfAttach, allowCollision //
	attachRules = 1,1,1,1,0

	title = S43B Series
	manufacturer = AVIBRAS - IAE
	description = Motor de combustível sólido desenvolvido pela Avibras em parceria com o IAE para o estágio lateral do VLS-1.
	tags = Brazil, Sonda, Cross, S40, S43, VS-40, VLS-1
	engineType = S43B
	stagingIcon = SOLID_BOOSTER
	stageOffset = 1
	childStageOffset = 1
	TechRequired = start
	cost = 180
	entryCost = 1
	
	MODULE
	{
		name = ModuleEnginesRF
		thrustVectorTransformName = thrustTransform
	}
	MODULE
	{
    	name = ModuleGimbal
    	gimbalResponseSpeed = 20
    	useGimbalResponseSpeed = true
    	gimbalTransformName = thrustTransform
    	gimbalRange = 2
    	gimbalLimitX = true  // Habilita yaw
    	gimbalLimitY = true  // Habilita pitch
    	gimbalLimitZ = false // Desabilita roll
	}
	MODULE
	{
		name = FXModuleLookAtConstraint
		CONSTRAINLOOKFX
		{
			targetName = LowerStrut1
			rotatorsName = UpperStrut1
		}
		CONSTRAINLOOKFX
		{
			targetName = LowerStrut2
			rotatorsName = UpperStrut2
		}
		CONSTRAINLOOKFX
		{
			targetName = UpperStrut1
			rotatorsName = LowerStrut1
		}
		CONSTRAINLOOKFX
		{
			targetName = UpperStrut2
			rotatorsName = LowerStrut2
		}
	}
	MODULE
	{
		name = ModuleSurfaceFX
		thrustProviderModuleIndex = 0
		fxMax = 0.5
		maxDistance = 30
		falloff = 1.5
		thrustTransformName = thrustTransform
	}
	MODULE
	{
		name = FXModuleThrottleEffects
		fxModuleNames = heatColor
		responseSpeed = 1.0
		dependOnEngineState = True
		dependOnThrottle = True
	}
	MODULE
	{
		name = FXModuleThrottleEffects
		fxModuleNames = throttleColor
		responseSpeed = 1.0
		dependOnEngineState = True
		dependOnThrottle = True
	}
	MODULE
	{
		name = ModuleColorChanger
		moduleID = heatColor
		animRate = 0.015
		shaderProperty = _EmissiveColor
		toggleInEditor = false
		toggleInFlight = false
		redCurve
		{
			key = 1 1 1 1
			key = 1 1 1 1
		}
		greenCurve
		{
			key = 0 0 1 1
			key = 1 1 1 1
		}
		blueCurve
		{
			key = 0 0 1 1
			key = 1 1 1 1
		}
		alphaCurve
		{
			key = 0 0 1 1
			key = 1 1 1 1
		}
	}
}
@PART[*]:HAS[#engineType[S43B]]:FOR[RealismOverhaulEngines]
{
    %title = S-43 Booster Lateral
    %manufacturer = Avibras/IAE
    %description = "O S43 Raio do Maranhão é o booster strap-on que o IAE criou quando alguém gritou: ‘Vamos fazer o VLS-1 decolar como um relâmpago!’ Usado em pares no VLS-1, esse monstro solta 300 kN de empuxo no lançamento, como um raio caindo no Maranhão e impulsionando 500 kg de carga até órbitas de 750 km. O propelente sólido composite queima com a força de uma tempestade nordestina, com ISP de 268s na atmosfera e 288s no vácuo – potência bruta com um toque de precisão. Pesa 2,0 t (0,4 t sem propelente), custa 15.000 fundos (porque no RO, raios não vêm de graça) e aguenta 22 m/s de impacto, testado na Usina Coronel Abner em 2017. Numa missão, a Valentina tentou ‘redirecionar’ o S43 com um ‘ajuste criativo’, e agora o CLA tem uma nova trilha turística: ‘o Sulco da Valentina’. Feito pela IAE, esse motor é como um bumba meu boi elétrico: intenso, rápido e impossível de ignorar."
    @MODULE[ModuleEngines*]
    {
        %EngineType = SolidBooster
    }

    !MODULE[ModuleEngineConfigs],*{}
    !MODULE[ModuleAlternator],*{}
    !MODULE[ModuleFuelTanks],*{}
    !RESOURCE[*],*{}
    !RESOURCE[SolidFuel],*{}

    @MODULE[ModuleGimbal]
	{
		%gimbalRange = 4.0
		%useGimbalResponseSpeed = true
		%gimbalResponseSpeed = 20
	}

    MODULE
    {
        name = ModuleEngineConfigs
        type = ModuleEngines
        configuration = S43B
        modded = false
        origMass = 1.245 // Massa vazia: 1245 kg

        CONFIG
        {
            name = S43B
            description = Motor de combustível sólido desenvolvido pela Avibras em parceria com o IAE para o estágio lateral do VLS-1.
            maxThrust = 303.7
            heatProduction = 160

            ullage = false
            pressureFed = false
            ignitions = 1

            IGNITOR_RESOURCE
            {
                name = ElectricCharge
                amount = 0.6
            }
            PROPELLANT
            {
                name = HTPB
                ratio = 1.0
                DrawGauge = True
                resourceFlowMode = STACK_PRIORITY_SEARCH
            }
            atmosphereCurve
            {
                key = 0 288
                key = 1 268
            }
            curveResource = HTPB
            %chamberNominalTemp = 2400
            %maxEngineTemp = 2450

            thrustCurve
            {
                key = 1.00 1.06
                key = 0.96 1.09
                key = 0.88 1.05
                key = 0.72 1.02
                key = 0.52 0.99
                key = 0.34 0.96
                key = 0.18 0.91
                key = 0.07 0.80
                key = 0.00 0.18
            }
        }
		CONFIG
        {
            name = S43B2
            description = Motor de combustível sólido desenvolvido pela Avibras em parceria com o IAE para o estágio lateral do VLS-1.
            maxThrust = 349.255
            heatProduction = 160

            ullage = false
            pressureFed = false
            ignitions = 1

            IGNITOR_RESOURCE
            {
                name = ElectricCharge
                amount = 0.6
            }
            PROPELLANT
            {
                name = HTPB
                ratio = 1.0
                DrawGauge = True
                resourceFlowMode = STACK_PRIORITY_SEARCH
            }
            atmosphereCurve
            {
                key = 0 265 // Vácuo
                key = 1 252 // SL
            }
            curveResource = HTPB
            %chamberNominalTemp = 2400
            %maxEngineTemp = 2450

            thrustCurve
            {
                key = 1.00 1.06
                key = 0.96 1.09
                key = 0.88 1.05
                key = 0.72 1.02
                key = 0.52 0.99
                key = 0.34 0.96
                key = 0.18 0.91
                key = 0.07 0.80
                key = 0.00 0.18
            }
        }
    }
    MODULE
    {
        name = ModuleFuelTanks
        volume = 4052 // Volume para 7180 kg de HTPB (densidade 1,772 kg/litro)
        type = HTPB
        basemass = -1
        TANK
        {
            name = HTPB
            amount = 4052
            maxAmount = 4052
        }
    }
}
@PART[*]:HAS[@MODULE[ModuleEngineConfigs]:HAS[@CONFIG[S43B]],!MODULE[TestFlightInterop]]:BEFORE[zTestFlight]
{
    TESTFLIGHT
    {
        name = S43B
        testedBurnTime = 64 // Margem de segurança
        ratedBurnTime = 62 // Tempo de queima calculado
        safeOverburn = true
        ignitionReliabilityStart = 0.880000
        ignitionReliabilityEnd = 0.980000
        cycleReliabilityStart = 0.900000
        cycleReliabilityEnd = 0.990000
        reliabilityDataRateMultiplier = 1
    }
	TESTFLIGHT
	{
		name = S43B2
		testedBurnTime = 64 // Margem de segurança
		ratedBurnTime = 62 // Tempo de queima calculado
		safeOverburn = true
		ignitionReliabilityStart = 0.880000
		ignitionReliabilityEnd = 0.980000
		cycleReliabilityStart = 0.900000
		cycleReliabilityEnd = 0.990000
		reliabilityDataRateMultiplier = 1
	}
    @MODULE[ModuleEngineConfigs]
    {
        @CONFIG[S43B]
        {
            %ratedBurnTime = #$/TESTFLIGHT[S43B]/ratedBurnTime$
        }
		@CONFIG[S43B2]
		{
			%ratedBurnTime = #$/TESTFLIGHT[S43B2]/ratedBurnTime$
		}	
    }
}
