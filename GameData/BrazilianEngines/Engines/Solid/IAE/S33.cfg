PART
{
	module = Part
	name = BRA-S33
	author = Cross Aerospace
	
	category = Engine
	subcategory = 0
	
	RSSROConfig = true
	RP0conf = true
	
	crashTolerance = 10
	maxTemp = 673.15
	skinTemp = 773.15
	fuelCrossfeed = true
	breakingForce = 10000
	breakingTorque = 10000
	
	//  ============================================================================
	//	Update Below
	//  ============================================================================
	
	MODEL
	{
		model = ROEngines/Assets/RN/aerobee300_srb
		scale = 1, 1, 1
	}
	
	scale = 1.0
	rescaleFactor = 2.725
	node_stack_top = 0.0, 0.5, 0.0, 0.0, 1.0, 0.0, 0
	node_stack_bottom = 0.0, -0.5, 0.0, 0.0, -1.0, 0.0, 0
	node_attach = 0,0.1,0,0,1,0,2
	// stack, srfAttach, allowStack, allowSrfAttach, allowCollision //
	attachRules = 1,1,1,1,0

	title = S33 Series
	manufacturer = AVIBRAS - IAE
	description = Motor de combustível sólido desenvolvido pela Avibras para foguetes de sondagem Sonda III, IV, VS e VSB-30.
	tags = Brazil, Sonda, Cross, S33, VSB-30
	engineType = S33
	stagingIcon = SOLID_BOOSTER
	stageOffset = 1
	childStageOffset = 1
	TechRequired = start
	cost = 70
	entryCost = 1
	
	MODULE
	{
		name = ModuleEnginesRF
		thrustVectorTransformName = thrustTransform
	}
	MODULE
	{
		name = FXModuleLookAtConstraint
		CONSTRAINLOOKFX
		{
			targetName = LowerStrut1
			rotatorsName = UpperStrut1
		}
		CONSTRAINLOOKFX
		{
			targetName = LowerStrut2
			rotatorsName = UpperStrut2
		}
		CONSTRAINLOOKFX
		{
			targetName = UpperStrut1
			rotatorsName = LowerStrut1
		}
		CONSTRAINLOOKFX
		{
			targetName = UpperStrut2
			rotatorsName = LowerStrut2
		}
	}
	MODULE
	{
		name = ModuleSurfaceFX
		thrustProviderModuleIndex = 0
		fxMax = 0.5
		maxDistance = 30
		falloff = 1.5
		thrustTransformName = thrustTransform
	}
	MODULE
	{
		name = FXModuleThrottleEffects
		fxModuleNames = heatColor
		responseSpeed = 1.0
		dependOnEngineState = True
		dependOnThrottle = True
	}
	MODULE
	{
		name = FXModuleThrottleEffects
		fxModuleNames = throttleColor
		responseSpeed = 1.0
		dependOnEngineState = True
		dependOnThrottle = True
	}
	MODULE
	{
		name = ModuleColorChanger
		moduleID = heatColor
		animRate = 0.015
		shaderProperty = _EmissiveColor
		toggleInEditor = false
		toggleInFlight = false
		redCurve
		{
			key = 1 1 1 1
			key = 1 1 1 1
		}
		greenCurve
		{
			key = 0 0 1 1
			key = 1 1 1 1
		}
		blueCurve
		{
			key = 0 0 1 1
			key = 1 1 1 1
		}
		alphaCurve
		{
			key = 0 0 1 1
			key = 1 1 1 1
		}
	}
}
@PART[*]:HAS[#engineType[S33]]:FOR[RealismOverhaulEngines]
{
    %title = S-33 SRB
    %manufacturer = IAE/Avibras
    %description = "Chegou o S30/S31 Fúria Verde-Amarela, a dupla que faz o céu de Kerbin tremer e o Jeb sonhar com explosões épicas! Forjados pelo IAE com o calor de Alcântara, esses motores são o orgulho do Programa Espacial Brasileiro. O S30 Urro do Cerrado, com 102 kN de empuxo e 1,2 t, é o jaguar que lança o Sonda III e IV com 300 kg até 600 km, com ISP 210s (atmosfera)/230s (vácuo) – perfeito pra quem gosta de subir com barulho. Já o S31 Tsunami de Alcântara, com 240 kN de empuxo e 0,9 t, é a onda bruta do VSB-30, levando 400 kg até 270 km com ISP 220s/240s, porque o Brasil não brinca em serviço. Ambos usam propelente sólido HTPB, que queima como um carnaval fora de época. O S30 custa 1.500 fundos e aguenta 18 m/s de impacto; o S31 sai por 1.800 fundos e resiste a 15 m/s. Cuidado: esses motores já tentaram ‘nadar’ no Atlântico nos anos 60, e o Gene Kerman ainda tá cobrando a conta. Escolha seu estilo – o urro ou o tsunami – e voe com a zueira brasileira rumo às estrelas!"
    @MODULE[ModuleEngines*]
    {
        %EngineType = SolidBooster
    }

    !MODULE[ModuleEngineConfigs],*{}
    !MODULE[ModuleAlternator],*{}
    !RESOURCE,*{}
    !RESOURCE[SolidFuel],*{}

    MODULE
    {
        name = ModuleEngineConfigs
        type = ModuleEngines
        configuration = S33
        modded = false
        origMass = 0.153

        CONFIG
        {
            name = S33
            description = O S30 Urro do Cerrado é o motor que parece que foi projetado numa noite de lua cheia no IAE, com os engenheiros gritando 'joga mais propelente, que a gente tá no cerrado!' Esse booster valente do Sonda III e IV solta 102 kN de empuxo no lançamento, como um jaguar acelerando pra mandar sua nave até 600 km com cargas de 300 kg. O propelente sólido composite queima com a energia de uma fogueira de São João, com ISP de 210s na atmosfera e 230s no vácuo – não é o mais econômico, mas tem garra pra subir gritando. Pesa 1,2 t, custa 1.500 fundos (porque o CLA cobra pelo espetáculo) e aguenta 18 m/s de impacto, testado nas dunas da Barreira do Inferno. Certa vez, o Jeb apertou o botão de ignição cedo demais e o S30 'redecorou' o pátio do lançamento com uma cratera que agora é point turístico. Feito pela IAE/Avibras, com aquele selo de 'explode com sotaque brasileiro'.
            maxThrust = 21.8
            heatProduction = 150

            ullage = false
            pressureFed = false
            ignitions = 1

            IGNITOR_RESOURCE
            {
                name = ElectricCharge
                amount = 0.5
            }
            PROPELLANT
            {
                name = HTPB
                ratio = 1.0
                DrawGauge = True
                resourceFlowMode = STACK_PRIORITY_SEARCH
            }
            atmosphereCurve
            {
                key = 0 260 // Vácuo
                key = 1 250 // SL
            } 
            curveResource = HTPB
            %chamberNominalTemp = 2400
            %maxEngineTemp = 2450
            thrustCurve
            {
				key = 1.00 0.98
				key = 0.96 1.00
				key = 0.85 1.01
				key = 0.65 1.01
				key = 0.45 1.00
				key = 0.28 0.99
				key = 0.14 0.96
				key = 0.05 0.85
				key = 0.00 0.15
            }
        }
    }
    MODULE
    {
        name = ModuleFuelTanks
        volume = 191.87
        type = HTPB
        basemass = -1
        TANK
        {
            name = HTPB
            amount = 191.87
            maxAmount = 191.87
        }
    }
}
@PART[*]:HAS[@MODULE[ModuleEngineConfigs]:HAS[@CONFIG[S33]],!MODULE[TestFlightInterop]]:BEFORE[zTestFlight]
{
    TESTFLIGHT
    {
        name = S33
        testedBurnTime = 20
        ratedBurnTime = 15
        safeOverburn = true

        ignitionReliabilityStart = 0.850000
        ignitionReliabilityEnd = 0.990000

        cycleReliabilityStart = 0.900000
        cycleReliabilityEnd = 0.990000

        reliabilityDataRateMultiplier = 1
    }
    @MODULE[ModuleEngineConfigs]
    {
        @CONFIG[S33]
        {
            %ratedBurnTime = #$/TESTFLIGHT[S33]/ratedBurnTime$
        }
    }
}
