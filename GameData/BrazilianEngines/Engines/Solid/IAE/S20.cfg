                ratio = 1.0
                DrawGauge = True
                resourceFlowMode = STACK_PRIORITY_SEARCH
            }
            atmosphereCurve
            {
                key = 0 260 // Vácuo
                key = 1 250 // SL
            }     
            curveResource = HTPB
            %chamberNominalTemp = 2400
            %maxEngineTemp = 2450
            thrustCurve
            {
