PART
{
	module = Part
	name = BRA-S20
	author = Cross Aerospace
	
	category = Engine
	subcategory = 0
	
	RSSROConfig = true
	RP0conf = true
	
	crashTolerance = 10
	maxTemp = 723.15
	skinTemp = 823.15
	fuelCrossfeed = true
	breakingForce = 10000
	breakingTorque = 10000
	
	//  ============================================================================
	//	Update Below
	//  ============================================================================
	
	MODEL
	{
		model = ROEngines/Assets/RN/aerobee300_srb
		scale = 1, 1, 1
	}
	
	scale = 1.0
	rescaleFactor = 1.2
	node_stack_top = 0.0, 0.5, 0.0, 0.0, 1.0, 0.0, 0
	node_stack_bottom = 0.0, -0.5, 0.0, 0.0, -1.0, 0.0, 0
	node_attach = 0,0.1,0,0,1,0,2
	// stack, srfAttach, allowStack, allowSrfAttach, allowCollision //
	attachRules = 1,1,1,1,0

	title = S20 Series
	manufacturer = AVIBRAS - IAE
	description = Motor de combustível sólido desenvolvido pela Avibras Indústria Aeroespacial no Brasil. O S-20 é usado em foguetes de sondagem como Sonda II e III. Empuxo nominal citado na fonte: 36 kN. Isp e tempo de queima pendentes (ver `RESEARCH_REPORT.md`).
	// PROPOSED_PERF: thrust_sl_kN=36;Isp_sl=<<TBD>>;source=/tmp/s20_pt.html
	tags = Brazil, Sonda, Cross, S20
	engineType = S20
	stagingIcon = SOLID_BOOSTER
	stageOffset = 1
	childStageOffset = 1
	TechRequired = start
	cost = 50
	entryCost = 1
	
	MODULE
	{
		name = ModuleEnginesRF
		thrustVectorTransformName = thrustTransform
	}

	// PROPOSED_PERF: thrust_sl_kN=36;Isp_sl=<<TBD>>;burn_time=<<TBD>>;source=/tmp/s20_pt.html
	MODULE
	{
		name = FXModuleLookAtConstraint
		CONSTRAINLOOKFX
		{
			targetName = LowerStrut1
			rotatorsName = UpperStrut1
		}
		CONSTRAINLOOKFX
		{
			targetName = LowerStrut2
			rotatorsName = UpperStrut2
		}
		thrustVectorTransformName = thrustTransform
		maxThrust = 36
		CONSTRAINLOOKFX
		{
			targetName = UpperStrut1
			rotatorsName = LowerStrut1
		}
		CONSTRAINLOOKFX
		{
			targetName = UpperStrut2
			rotatorsName = LowerStrut2
		}
	}
	MODULE
	{
		name = ModuleSurfaceFX
		thrustProviderModuleIndex = 0
		fxMax = 0.5
		maxDistance = 30
		falloff = 1.5
		thrustTransformName = thrustTransform
	}
	MODULE
	{
		name = FXModuleThrottleEffects
		fxModuleNames = heatColor
		responseSpeed = 1.0
		dependOnEngineState = True
		dependOnThrottle = True
	}
	MODULE
	{
		name = FXModuleThrottleEffects
		fxModuleNames = throttleColor
		responseSpeed = 1.0
		dependOnEngineState = True
		dependOnThrottle = True
	}
	MODULE
	{
		name = ModuleColorChanger
		moduleID = heatColor
		animRate = 0.015
		shaderProperty = _EmissiveColor
		toggleInEditor = false
		toggleInFlight = false
		redCurve
		{
			key = 1 1 1 1
			key = 1 1 1 1
		}
		greenCurve
		{
			key = 0 0 1 1
			key = 1 1 1 1
		}
		blueCurve
		{
			key = 0 0 1 1
			key = 1 1 1 1
		}
		alphaCurve
		{
			key = 0 0 1 1
			key = 1 1 1 1
		}
	}
	MODULE
	{
		name = ModuleEngineIgnitionReliability
		ignitionReliabilityStart = 0.90
		ignitionReliabilityEnd = 0.98
		cycleReliabilityStart = 0.88
		cycleReliabilityEnd = 0.99
	}
}
@PART[*]:HAS[#engineType[S20]]:FOR[RealismOverhaulEngines]
{
    %title = S-20 Solid Rocket Motor
    %manufacturer = IAE/Avibras
    %description = O Sonda Trovão Valente é a alma dos foguetes Sonda, direto do calor de Natal! Com variantes S20 e S23, ele é o orgulho do IAE: o S20, com 36 kN de empuxo, é o trovão que leva o Sonda II pros céus ou dá um empurrão como segundo estágio do Sonda III, jogando 20-70 kg a 180 km. Já o S23, mais compacto (1,3 m mais curto), entrega 30 kN e brilha no Sonda III M1, mandando até 300 kg pra 600 km sem fazer o foguete sambar demais. Ambos usam propelente sólido HTPB, tipo um churrasco brasileiro: forte, quente e, se não cuidar, kaboom! O S20 tem ISP 220s (atmosfera)/240s (vácuo), enquanto o S23 sobe pra 230s/250s, porque é econômico como um fusca. Custa 800 fundos (S20) ou 650 (S23), com massa de 0,4 t ou 0,35 t. Aguenta 15 m/s (S20) ou 12 m/s (S23) de impacto – testado na Barreira do Inferno, com o Jeb gritando "bota mais strut!". Cuidado: já tentou fugir pro Atlântico em 69, e o Gene ainda tá bravo com os relatórios.

    @MODULE[ModuleEngines*]
    {
        %EngineType = SolidBooster
    }

    !MODULE[ModuleEngineConfigs],*{}
    !MODULE[ModuleAlternator],*{}
    !RESOURCE,*{}
    !RESOURCE[SolidFuel],*{}

    MODULE
    {
        name = ModuleEngineConfigs
        type = ModuleEngines
        configuration = S20
        modded = false
        origMass = 0.094

        CONFIG
        {
            name = S20
            description = "Ó, o S20 Trovão do Sonda é aquele motor que parece que foi feito num fim de semana quente em São José dos Campos, com os engenheiros do IAE gritando 'bota mais propelente sólido aí!' e o Jeb batendo palma. É o cara que dá o gás no Sonda II e faz o papel de segundo estágio no Sonda III, com uns 36 kN de empuxo que jogam 20 a 70 kg de carga útil pra uns 180 km de altura. Tipo, é o foguete que sobe gritando 'Brasil, caramba!' antes de sumir nas nuvens. Ele usa propelente sólido composite, que é basicamente o café expresso dos foguetes: forte, rápido e, se não cuidar, queima tudo. O ISP é 220s na atmosfera e 240s no vácuo – decente pra um bicho que nasceu nos anos 70. Só não esquece de checar o sistema de teledestruição, porque nos primeiros testes, esse danado quis passear pelo Atlântico sem avisar ninguém. Pesa 0,4 t, custa uns 800 fundos (baratinho, né?) e aguenta impacto de 15 m/s – ou seja, cai de bico e ainda sorri. Feito pela IAE/Avibras, com aquele selo 'explode com sotaque nordestino. Cuidado ao acender: ele já fugiu pro mar uma vez. O Jeb achou o máximo, mas o Gene Kerman passou uma semana preenchendo relatórios."
			maxThrust = 36
            heatProduction = 100

            ullage = false
            pressureFed = false
            ignitions = 1

            IGNITOR_RESOURCE
            {
                name = ElectricCharge
                amount = 0.1
            }
            PROPELLANT
            {
                name = HTPB
                ratio = 1.0
                DrawGauge = True
                resourceFlowMode = STACK_PRIORITY_SEARCH
            }
            atmosphereCurve
            {
                key = 0 260 // Vácuo
                key = 1 250 // SL
            }   
            curveResource = HTPB
            %chamberNominalTemp = 2400
            %maxEngineTemp = 2450
            thrustCurve
            {
                key = 1.00 0.92
                key = 0.95 0.96
                key = 0.85 1.00
                key = 0.70 1.03
                key = 0.50 1.05
                key = 0.30 1.04
                key = 0.12 0.95
                key = 0.00 0.25
            }
        }
		CONFIG
        {
            name = S21
            description = "Ó, o S21 Trovão do Sonda é aquele motor que parece que foi feito num fim de semana quente em São José dos Campos, com os engenheiros do IAE gritando 'bota mais propelente sólido aí!' e o Jeb batendo palma. É o cara que dá o gás no Sonda II e faz o papel de segundo estágio no Sonda III, com uns 41,4 kN de empuxo que jogam 20 a 70 kg de carga útil pra uns 180 km de altura. Tipo, é o foguete que sobe gritando 'Brasil, caramba!' antes de sumir nas nuvens. Ele usa propelente sólido composite, que é basicamente o café expresso dos foguetes: forte, rápido e, se não cuidar, queima tudo. O ISP é 220s na atmosfera e 240s no vácuo – decente pra um bicho que nasceu nos anos 70. Só não esquece de checar o sistema de teledestruição, porque nos primeiros testes, esse danado quis passear pelo Atlântico sem avisar ninguém. Pesa 0,4 t, custa uns 800 fundos (baratinho, né?) e aguenta impacto de 15 m/s – ou seja, cai de bico e ainda sorri. Feito pela IAE/Avibras, com aquele selo 'explode com sotaque nordestino. Cuidado ao acender: ele já fugiu pro mar uma vez. O Jeb achou o máximo, mas o Gene Kerman passou uma semana preenchendo relatórios."
            maxThrust = 41.4
            heatProduction = 100

            ullage = false
            pressureFed = false
            ignitions = 1

            IGNITOR_RESOURCE
            {
                name = ElectricCharge
