            }     
            curveResource = HTPB
            %chamberNominalTemp = 2400
            %maxEngineTemp = 2450
            thrustCurve
            {
                key = 1.00 0.92
                key = 0.95 0.96
                key = 0.85 1.00
                key = 0.70 1.03
                key = 0.50 1.05
                key = 0.30 1.04
