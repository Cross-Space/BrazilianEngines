                key = 0.50 1.05
                key = 0.30 1.04
                key = 0.12 0.95
                key = 0.00 0.25
            }
        }
    }
    MODULE
    {
        name = ModuleFuelTanks
        volume = 125.85 // Volume para 7180 kg de HTPB (densidade 1,772 kg/litro)
        type = HTPB
        basemass = -1
