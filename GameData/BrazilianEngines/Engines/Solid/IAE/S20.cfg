@PART[*]:HAS[@MODULE[ModuleEngineConfigs]:HAS[@CONFIG[S20]],!MODULE[TestFlightInterop]]:BEFORE[zTestFlight]
{
    TESTFLIGHT
    {
        name = S20
        testedBurnTime = 22 // Margem de segurança
        ratedBurnTime = 20 // Tempo de queima real do S-20
        safeOverburn = true

        ignitionReliabilityStart = 0.850000
        ignitionReliabilityEnd = 0.990000

        cycleReliabilityStart = 0.900000
        cycleReliabilityEnd = 0.990000

        reliabilityDataRateMultiplier = 1
    }
	TESTFLIGHT
    {
        name = S21
        testedBurnTime = 22 // Margem de segurança
        ratedBurnTime = 20 // Tempo de queima real do S-21
        safeOverburn = true

        ignitionReliabilityStart = 0.850000
        ignitionReliabilityEnd = 0.990000

        cycleReliabilityStart = 0.900000
        cycleReliabilityEnd = 0.990000

        reliabilityDataRateMultiplier = 1
    }
	TESTFLIGHT
    {
        name = S22
        testedBurnTime = 22 // Margem de segurança
        ratedBurnTime = 20 // Tempo de queima real do S-22
        safeOverburn = true

        ignitionReliabilityStart = 0.850000
        ignitionReliabilityEnd = 0.990000

        cycleReliabilityStart = 0.900000
        cycleReliabilityEnd = 0.990000

        reliabilityDataRateMultiplier = 1
    }
    @MODULE[ModuleEngineConfigs]
    {
        @CONFIG[S20]
        {
            %ratedBurnTime = #$/TESTFLIGHT[S20]/ratedBurnTime$
        }
        @CONFIG[S21]
        {
            %ratedBurnTime = #$/TESTFLIGHT[S21]/ratedBurnTime$
        }
		@CONFIG[S22]
		{
			%ratedBurnTime = #$/TESTFLIGHT[S22]/ratedBurnTime$
		}
    }
}
