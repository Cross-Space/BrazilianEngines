PART
{
	module = Part
	name = BRA-S30
	author = Cross Aerospace
	
	category = Engine
	subcategory = 0
	
	RSSROConfig = true
	RP0conf = true
	
	crashTolerance = 10
	maxTemp = 673.15
	skinTemp = 773.15
	fuelCrossfeed = true
	breakingForce = 10000
	breakingTorque = 10000
	
	//  ============================================================================
	//	Update Below
	//  ============================================================================
	
	MODEL
	{
		model = ROEngines/Assets/RN/aerobee300_srb
		scale = 1, 1, 1
	}
	
	scale = 1.0
	rescaleFactor = 2.3172
	node_stack_top = 0.0, 0.5, 0.0, 0.0, 1.0, 0.0, 0
	node_stack_bottom = 0.0, -0.5, 0.0, 0.0, -1.0, 0.0, 0
	node_attach = 0,0.1,0,0,1,0,2
	// stack, srfAttach, allowStack, allowSrfAttach, allowCollision //
