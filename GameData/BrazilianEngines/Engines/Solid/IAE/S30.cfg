@PART[*]:HAS[#engineType[S30]]:FOR[RealismOverhaulEngines]
{
    %title = S-30 SRB
    %manufacturer = IAE/Avibras
    %description = "Chegou o S30/S31 Fúria Verde-Amarela, a dupla que faz o céu de Kerbin tremer e o Jeb sonhar com explosões épicas! Forjados pelo IAE com o calor de Alcântara, esses motores são o orgulho do Programa Espacial Brasileiro. O S30 Urro do Cerrado, com 102 kN de empuxo e 1,2 t, é o jaguar que lança o Sonda III e IV com 300 kg até 600 km, com ISP 210s (atmosfera)/230s (vácuo) – perfeito pra quem gosta de subir com barulho. Já o S31 Tsunami de Alcântara, com 240 kN de empuxo e 0,9 t, é a onda bruta do VSB-30, levando 400 kg até 270 km com ISP 220s/240s, porque o Brasil não brinca em serviço. Ambos usam propelente sólido HTPB, que queima como um carnaval fora de época. O S30 custa 1.500 fundos e aguenta 18 m/s de impacto; o S31 sai por 1.800 fundos e resiste a 15 m/s. Cuidado: esses motores já tentaram ‘nadar’ no Atlântico nos anos 60, e o Gene Kerman ainda tá cobrando a conta. Escolha seu estilo – o urro ou o tsunami – e voe com a zueira brasileira rumo às estrelas!"
    @MODULE[ModuleEngines*]
    {
        %EngineType = SolidBooster
    }

    !MODULE[ModuleEngineConfigs],*{}
    !MODULE[ModuleAlternator],*{}
    !RESOURCE,*{}
    !RESOURCE[SolidFuel],*{}

    MODULE
    {
        name = ModuleEngineConfigs
        type = ModuleEngines
        configuration = S30
        modded = false
        origMass = 0.347

        CONFIG
        {
            name = S30
            description = O S30 Urro do Cerrado é o motor que parece que foi projetado numa noite de lua cheia no IAE, com os engenheiros gritando 'joga mais propelente, que a gente tá no cerrado!' Esse booster valente do Sonda III e IV solta 102 kN de empuxo no lançamento, como um jaguar acelerando pra mandar sua nave até 600 km com cargas de 300 kg. O propelente sólido composite queima com a energia de uma fogueira de São João, com ISP de 210s na atmosfera e 230s no vácuo – não é o mais econômico, mas tem garra pra subir gritando. Pesa 1,2 t, custa 1.500 fundos (porque o CLA cobra pelo espetáculo) e aguenta 18 m/s de impacto, testado nas dunas da Barreira do Inferno. Certa vez, o Jeb apertou o botão de ignição cedo demais e o S30 'redecorou' o pátio do lançamento com uma cratera que agora é point turístico. Feito pela IAE/Avibras, com aquele selo de 'explode com sotaque brasileiro'.
            
            maxThrust = 95
            heatProduction = 150

            ullage = false
            pressureFed = false
            ignitions = 1

            IGNITOR_RESOURCE
            {
                name = ElectricCharge
                amount = 0.5
            }
            PROPELLANT
            {
                name = HTPB
                ratio = 1.0
                DrawGauge = True
                resourceFlowMode = STACK_PRIORITY_SEARCH
            }
            atmosphereCurve
            {
                key = 0 260 // Vácuo
                key = 1 250 // SL
            } 
            curveResource = HTPB
            %chamberNominalTemp = 2400
            %maxEngineTemp = 2450
            thrustCurve
            {
                key = 1.00 0.98
                key = 0.96 1.00
                key = 0.85 1.01
                key = 0.65 1.01
                key = 0.45 1.00
                key = 0.28 0.99
                key = 0.14 0.96
                key = 0.05 0.85
                key = 0.00 0.15
            }
        }
        CONFIG
        {
            name = S31
            description = O S31 Tsunami de Alcântara é o que acontece quando o IAE pega o S30, dá um tapa no visual e diz: 'Agora vamos botar pra quebrar!' Com um empuxo monstro de 240 kN, esse motor, usado no VSB-30, é como uma onda gigante que leva sua nave até 270 km com cargas de 400 kg, sem nem piscar. O propelente sólido composite queima com a força de um bloco de carnaval, com ISP de 220s na atmosfera e 240s no vácuo, porque potência sem eficiência não é com o Brasil. Pesa 0,9 t (com 0,284 t sem propelente), custa 1.800 fundos (tecnologia top tem seu preço) e aguenta 15 m/s de impacto, porque é bruto, mas não curte aterrissagens forçadas. Numa missão, a Valentina tentou um teste 'criativo' com o S31 e acabou deixando uma trilha de fumaça que os kerbals confundiram com um dragão. Feito pela IAE, esse motor é tipo um frevo: rápido, intenso e impossível de ignorar.
			maxThrust = 240.1
			massMult = 1.1

            ullage = false
            pressureFed = false
            ignitions = 1

            IGNITOR_RESOURCE
            {
                name = ElectricCharge
                amount = 0.3
            }
            PROPELLANT
            {
                name = HTPB
                ratio = 1.0
                DrawGauge = True
                resourceFlowMode = STACK_PRIORITY_SEARCH
            }
            atmosphereCurve
            {
                key = 0 260 // Vácuo
                key = 1 250 // SL
            } 
            curveResource = HTPB
            %chamberNominalTemp = 2400
            %maxEngineTemp = 2450
            thrustCurve
            {
                key = 1.00 1.08
                key = 0.97 1.10
                key = 0.90 1.06
                key = 0.75 1.02
                key = 0.55 0.99
                key = 0.35 0.95
                key = 0.18 0.90
                key = 0.06 0.78
                key = 0.00 0.12
            }
        }
    }
    MODULE
    {
        name = ModuleFuelTanks
        volume = 487.5846
        type = HTPB
        basemass = -1
        TANK
        {
            name = HTPB
            amount = 487.5846
            maxAmount = 487.5846
        }
    }
}
@PART[*]:HAS[@MODULE[ModuleEngineConfigs]:HAS[@CONFIG[S30]],!MODULE[TestFlightInterop]]:BEFORE[zTestFlight]
{
    TESTFLIGHT
    {
        name = S30

        testedBurnTime = 40 // Margem de segurança
        ratedBurnTime = 30 // Tempo de queima padrão

        safeOverburn = true

        ignitionReliabilityStart = 0.850000
        ignitionReliabilityEnd = 0.990000

        cycleReliabilityStart = 0.900000
        cycleReliabilityEnd = 0.990000

        reliabilityDataRateMultiplier = 1
    }
    @MODULE[ModuleEngineConfigs]
    {
        @CONFIG[S30]
        {
            %ratedBurnTime = #$/TESTFLIGHT[S30]/ratedBurnTime$
        }
    }
}
@PART[*]:HAS[@MODULE[ModuleEngineConfigs]:HAS[@CONFIG[S31]],!MODULE[TestFlightInterop]]:BEFORE[zTestFlight]
{
    TESTFLIGHT
    {
        name = S31
        testedBurnTime = 40 // Margem de segurança
        ratedBurnTime = 35 // Tempo de queima padrão
        safeOverburn = true

        ignitionReliabilityStart = 0.850000
        ignitionReliabilityEnd = 0.990000

        cycleReliabilityStart = 0.900000
        cycleReliabilityEnd = 0.990000

        reliabilityDataRateMultiplier = 1
    }
    @MODULE[ModuleEngineConfigs]
    {
        @CONFIG[S31]
        {
            %ratedBurnTime = #$/TESTFLIGHT[S31]/ratedBurnTime$
        }
    }
}
