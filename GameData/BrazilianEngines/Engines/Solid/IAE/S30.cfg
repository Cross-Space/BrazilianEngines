	title = S30 Series
	manufacturer = AVIBRAS - IAE
	description = Motor de combustível sólido desenvolvido pela Avibras para foguetes de sondagem Sonda III, IV, VS e VSB-30.
	tags = Brazil, Sonda, Cross, S30, S31, VSB-30
	engineType = S30
	stagingIcon = SOLID_BOOSTER
	stageOffset = 1
	childStageOffset = 1
	TechRequired = start
	cost = 50
	entryCost = 1
	
	MODULE
	{
		name = ModuleEnginesRF
		thrustVectorTransformName = thrustTransform
	}
	MODULE
	{
