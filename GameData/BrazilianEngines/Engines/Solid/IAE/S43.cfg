PART
{
	module = Part
	name = BRA-S43
	author = Cross Aerospace
	
	category = Engine
	subcategory = 0
	
	RSSROConfig = true
	RP0conf = true
	
	crashTolerance = 10
	maxTemp = 673.15
	skinTemp = 773.15
	fuelCrossfeed = true
	breakingForce = 10000
	breakingTorque = 10000
	
	//  ============================================================================
	//	Update Below
	//  ============================================================================
	
	MODEL
	{
		model = BrazilianEngines/Models/VLM-S-50V
		scale = 1, 1, 1
	}
	
	scale = 1.0
	rescaleFactor = 0.7299
	node_stack_top = 0.0, 0.5, 0.0, 0.0, 1.0, 0.0, 0
	node_stack_bottom = 0.0, -0.5, 0.0, 0.0, -1.0, 0.0, 0
	node_attach = 0,0.1,0,0,1,0,2
	// stack, srfAttach, allowStack, allowSrfAttach, allowCollision //
	attachRules = 1,1,1,1,0

	title = S40 Series
	manufacturer = AVIBRAS - IAE
	description = Motor de combustível sólido desenvolvido pela Avibras para o primeiro estágio do VLS-1 e VS-40. Empuxo total citado em fonte: ~303 kN (boosters); Isp preliminar ≈ 225 s. Ver `RESEARCH_REPORT.md`.
	// PROPOSED_PERF: thrust_total_kN=303;Isp_sl=225;source=/tmp/s43_pt.html
	tags = Brazil, Sonda, Cross, S40, S43, VS-40, VLS-1
	engineType = S40
	stagingIcon = SOLID_BOOSTER
	stageOffset = 1
	childStageOffset = 1
	TechRequired = start
	cost = 160
	entryCost = 1
	
	MODULE
	{
		name = ModuleEnginesRF
		thrustVectorTransformName = thrustTransform
	}
	MODULE
	{
    	name = ModuleGimbal
    	gimbalResponseSpeed = 20
    	useGimbalResponseSpeed = true
    	gimbalTransformName = thrustTransform
    	gimbalRange = 4
    	gimbalLimitX = true  // Habilita yaw
    	gimbalLimitY = true  // Habilita pitch
    	gimbalLimitZ = false // Desabilita roll
	}
	MODULE
	{
		name = FXModuleLookAtConstraint
		CONSTRAINLOOKFX
		{
			targetName = LowerStrut1
			rotatorsName = UpperStrut1
		}
		CONSTRAINLOOKFX
		{
			targetName = LowerStrut2
			rotatorsName = UpperStrut2
		}
		CONSTRAINLOOKFX
		{
			targetName = UpperStrut1
			rotatorsName = LowerStrut1
		}
		CONSTRAINLOOKFX
		{
			targetName = UpperStrut2
			rotatorsName = LowerStrut2
		}
	}
	MODULE
	{
		name = ModuleSurfaceFX
		thrustProviderModuleIndex = 0
		fxMax = 0.5
		maxDistance = 30
		falloff = 1.5
		thrustTransformName = thrustTransform
	}
	MODULE
	{
		name = FXModuleThrottleEffects
		fxModuleNames = heatColor
		responseSpeed = 1.0
		dependOnEngineState = True
		dependOnThrottle = True
	}
	MODULE
	{
		name = FXModuleThrottleEffects
		fxModuleNames = throttleColor
		responseSpeed = 1.0
		dependOnEngineState = True
		dependOnThrottle = True
	}
	MODULE
	{
		name = ModuleColorChanger
		moduleID = heatColor
		animRate = 0.015
		shaderProperty = _EmissiveColor
		toggleInEditor = false
		toggleInFlight = false
		redCurve
		{
			key = 1 1 1 1
			key = 1 1 1 1
		}
		greenCurve
		{
			key = 0 0 1 1
			key = 1 1 1 1
		}
		blueCurve
		{
			key = 0 0 1 1
			key = 1 1 1 1
		}
		alphaCurve
		{
			key = 0 0 1 1
			key = 1 1 1 1
		}
	}
}
