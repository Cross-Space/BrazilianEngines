@PART[*]:HAS[@MODULE[ModuleEngineConfigs]:HAS[@CONFIG[S40]],!MODULE[TestFlightInterop]]:BEFORE[zTestFlight]
{
    TESTFLIGHT
    {
        name = S40
        testedBurnTime = 64 // Margem de segurança
        ratedBurnTime = 60 // Tempo de queima ajustado para 60 s (fonte VLS)
        safeOverburn = true

        ignitionReliabilityStart = 0.850000
        ignitionReliabilityEnd = 0.990000

        cycleReliabilityStart = 0.900000
        cycleReliabilityEnd = 0.990000

        reliabilityDataRateMultiplier = 1
    }
    TESTFLIGHT
    {
        name = S43
        testedBurnTime = 64 // Margem de segurança
        ratedBurnTime = 60 // Tempo de queima ajustado para 60 s (fonte VLS)
        safeOverburn = true

        ignitionReliabilityStart = 0.850000
        ignitionReliabilityEnd = 0.990000

        cycleReliabilityStart = 0.900000
        cycleReliabilityEnd = 0.990000

        reliabilityDataRateMultiplier = 1
    }
    TESTFLIGHT
    {
        name = S43TM
        testedBurnTime = 64 // Margem de segurança
        ratedBurnTime = 60 // Tempo de queima ajustado para 60 s (fonte VLS)
        safeOverburn = true

        ignitionReliabilityStart = 0.850000
        ignitionReliabilityEnd = 0.990000

        cycleReliabilityStart = 0.900000
        cycleReliabilityEnd = 0.990000

        reliabilityDataRateMultiplier = 1
    }
    @MODULE[ModuleEngineConfigs]
    {
        @CONFIG[S40]
        {
            %ratedBurnTime = #$/TESTFLIGHT[S40]/ratedBurnTime$
        }
        @CONFIG[S43]
        {
            %ratedBurnTime = #$/TESTFLIGHT[S43]/ratedBurnTime$
        }
        @CONFIG[S43TM]
        {
            %ratedBurnTime = #$/TESTFLIGHT[S43TM]/ratedBurnTime$
        }
    }
}
