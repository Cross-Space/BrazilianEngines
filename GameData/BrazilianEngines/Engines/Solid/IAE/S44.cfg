                resourceFlowMode = STACK_PRIORITY_SEARCH
            }
            atmosphereCurve
            {
                key = 0 282
                key = 1 252
            }
            curveResource = HTPB
            %chamberNominalTemp = 2400
            %maxEngineTemp = 2450

            thrustCurve
            {
                key = 1.00 1.02
                key = 0.98 1.04
                key = 0.93 1.05
                key = 0.85 1.04
                key = 0.72 1.03
                key = 0.58 1.02
                key = 0.45 1.01
                key = 0.32 1.00
                key = 0.22 0.98
                key = 0.14 0.95
                key = 0.08 0.90
