    {
        name = S44
        testedBurnTime = 70 // Margem de segurança
        ratedBurnTime = 68 // Tempo de queima ajustado para 68 s (fonte VLS)
        safeOverburn = true

        ignitionReliabilityStart = 0.880000
        ignitionReliabilityEnd = 0.980000

        cycleReliabilityStart = 0.900000
        cycleReliabilityEnd = 0.990000

        reliabilityDataRateMultiplier = 1
    }
	TESTFLIGHT
	{
		name = S44a
		testedBurnTime = 70 // Margem de segurança
		ratedBurnTime = 68 // Tempo de queima ajustado para 68 s (fonte VLS)
		safeOverburn = true

		ignitionReliabilityStart = 0.880000
		ignitionReliabilityEnd = 0.980000

		cycleReliabilityStart = 0.900000
		cycleReliabilityEnd = 0.990000

		reliabilityDataRateMultiplier = 1
